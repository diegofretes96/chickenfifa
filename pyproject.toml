[tool.ruff]
target-version = "py312"
line-length = 100
exclude = ["migrations", ".venv", "staticfiles"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "S", "B", "A", "C4", "DTZ", "DJ"]
ignore = [
    "S101",   # assert en tests
    "DJ001",  # null=True en CharField (usamos para FK opcionales)
]

[tool.ruff.lint.per-file-ignores]
"*/migrations/*.py" = ["E501", "F401"]
"config/settings/*.py" = ["F401", "F403", "F405"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.local"
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "--reuse-db -v"
filterwarnings = ["ignore::DeprecationWarning"]

[tool.coverage.run]
source = ["apps"]
omit = ["*/migrations/*", "*/tests/*", "manage.py"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
plugins = ["mypy_django_plugin.main"]

[tool.django-stubs]
django_settings_module = "config.settings.local"
