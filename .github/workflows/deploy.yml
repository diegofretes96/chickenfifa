# =============================================================================
# GitHub Actions — CI/CD para ChickenFifa
# Disparador: push a main
# Pipeline:
#   1. Lint + Tests
#   2. Build y push imagen Docker a OCIR
#   3. Deploy SSH al servidor OCI
# =============================================================================
name: CI/CD — ChickenFifa

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  IMAGE_TAG: ${{ github.sha }}

# ──────────────────────────────────────────────────────────────────────────────
jobs:

  # ── JOB 1: Lint y Tests ─────────────────────────────────────────────────────
  test:
    name: Lint & Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: chickenfifa_test
          POSTGRES_USER: chickenfifa
          POSTGRES_PASSWORD: chickenfifa_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r requirements/local.txt

      - name: Ejecutar Ruff (linting)
        run: ruff check .

      - name: Ejecutar tests con pytest
        env:
          SECRET_KEY: "github-actions-test-secret-key-not-for-production"
          DATABASE_URL: "postgres://chickenfifa:chickenfifa_pass@localhost:5432/chickenfifa_test"
          DJANGO_SETTINGS_MODULE: config.settings.local
          CELERY_BROKER_URL: "memory://"
          DEBUG: "True"
          PREDICTION_LOCK_MINUTES: "30"
        run: |
          pytest --cov=apps --cov-report=xml --cov-report=term -v

      - name: Subir reporte de cobertura
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ── JOB 2: Build y Push a OCIR ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker → OCIR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image_full: ${{ steps.meta.outputs.image_full }}

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a Oracle Container Registry (OCIR)
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OCI_REGISTRY }}
          username: ${{ secrets.OCI_NAMESPACE }}/${{ secrets.OCI_USERNAME }}
          password: ${{ secrets.OCI_AUTH_TOKEN }}

      - name: Generar metadatos de imagen
        id: meta
        run: |
          IMAGE_FULL="${{ secrets.OCI_REGISTRY }}/${{ secrets.OCI_NAMESPACE }}/${{ secrets.OCI_REPO_NAME }}"
          echo "image_full=${IMAGE_FULL}" >> $GITHUB_OUTPUT
          echo "IMAGE_FULL=${IMAGE_FULL}" >> $GITHUB_ENV

      - name: Build y Push imagen multi-plataforma
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: runner
          push: true
          tags: |
            ${{ env.IMAGE_FULL }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_FULL }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

  # ── JOB 3: Deploy a OCI Compute ─────────────────────────────────────────────
  deploy:
    name: Deploy → OCI
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar clave SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}

      - name: Agregar host OCI a known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.OCI_INSTANCE_IP }} >> ~/.ssh/known_hosts

      - name: Copiar docker-compose al servidor
        run: |
          scp docker-compose.yml docker-compose.prod.yml \
            ubuntu@${{ secrets.OCI_INSTANCE_IP }}:/opt/chickenfifa/

      - name: Deploy en servidor OCI
        env:
          OCI_REGISTRY: ${{ secrets.OCI_REGISTRY }}
          OCI_NAMESPACE: ${{ secrets.OCI_NAMESPACE }}
          OCI_REPO_NAME: ${{ secrets.OCI_REPO_NAME }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          ssh ubuntu@${{ secrets.OCI_INSTANCE_IP }} << 'REMOTE_EOF'
            set -e
            cd /opt/chickenfifa

            echo "==> Login a OCIR..."
            echo "$OCI_AUTH_TOKEN" | docker login \
              "$OCI_REGISTRY" \
              -u "$OCI_NAMESPACE/$OCI_USERNAME" \
              --password-stdin

            echo "==> Pull imagen nueva..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull web celery

            echo "==> Reiniciando servicios con zero-downtime..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              up -d --no-deps --remove-orphans web celery nginx

            echo "==> Limpiando imágenes antiguas..."
            docker image prune -f --filter "until=24h"

            echo "==> Deploy completado exitosamente."
          REMOTE_EOF

        # Las variables de entorno del servidor deben estar en /opt/chickenfifa/.env
        # (gestionado manualmente o via OCI Vault)

      - name: Verificar health del deploy
        run: |
          sleep 15
          curl --fail --retry 5 --retry-delay 5 \
            "http://${{ secrets.OCI_INSTANCE_IP }}/admin/login/" \
            -o /dev/null -s -w "HTTP Status: %{http_code}\n"
