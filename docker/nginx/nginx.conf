upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    # Redirección HTTP → HTTPS en producción
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name chickenfifa.com www.chickenfifa.com;

    ssl_certificate     /etc/letsencrypt/live/chickenfifa.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chickenfifa.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    client_max_body_size 10M;

    # Archivos estáticos (servidos por Nginx, no Django)
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /app/mediafiles/;
        expires 7d;
    }

    # Todo lo demás → Gunicorn
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
    }
}
