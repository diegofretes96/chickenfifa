# =============================================================================
# docker-compose.prod.yml — Sobreescritura para PRODUCCIÓN (OCI)
# Uso: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# =============================================================================
version: "3.9"

services:
  web:
    image: ${WEB_IMAGE:-chicken-web}
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    ports:
      - "8000:8000"
    volumes:
      - .:/app                                          # código live: git pull = deploy inmediato
      - ./docker/entrypoint.sh:/entrypoint.sh           # entrypoint live, no requiere rebuild
      - media_data:/app/mediafiles
      - static_data:/app/staticfiles

  celery:
    image: ${CELERY_IMAGE:-chicken-celery}
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    volumes:
      - .:/app                                          # código live
      - ./docker/entrypoint.sh:/entrypoint.sh           # entrypoint live

  # Nginx como reverse proxy para servir static/media y hacer TLS termination
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/mediafiles:ro
      - certbot_data:/etc/letsencrypt:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  postgres_data:
  media_data:
  static_data:
  certbot_data:
